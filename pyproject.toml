[tool.ruff]
# Set the maximum line length to 120.
line-length = 120

# Assume Python 3.11
target-version = "py311"

# Enable Pyflakes (F) and a subset of the pycodestyle (E) codes by default.
# E4, E7, E9 are the default pycodestyle codes.
lint.select = ["E4", "E7", "E9", "F", "W", "I"]

# Allow autofix for all enabled rules (when `--fix`) is provided.
lint.fixable = ["ALL"]
lint.unfixable = []

# Exclude a variety of commonly ignored directories.
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
    "python_embedded"
]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
explicit_package_bases = true
namespace_packages = true
exclude = [
    "^python_embedded/",
    "^build/",
    "^dist/",
    "^tests/"
]
